<!doctype html>
<html lang="en">
  <head>
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Zenmart</title>

      <link rel="preconnect" href="https://fonts.googleapis.com" />
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
      <link
        href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet"
      />

      <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous"
        referrerpolicy="no-referrer"
      />

      <link rel="stylesheet" href="../public/css/login.css" />
      <link rel="stylesheet" href="../public/css/command.css" />
      <link rel="stylesheet" href="../public/css/signUp.css" />
    </head>
  </head>
  <body>
    <!-- NAvbar Frame -->
    <div class="navbar_frame">
      <div class="container">
        <div class="navbar_top">
          <img src="../public/images/icons/logo.png" alt="" />

          <div class="navbar_search_frame">
            <div class="navbar_search">
              <div class="select_category">
                <select name="" id="">
                  <option value="all" selected>All Category</option>
                  <option value="computer">Computer</option>
                </select>
              </div>
              <input type="text" placeholder="Search product..." />
            </div>

            <div class="navbar_search_icon">
              <img src="../public/images/icons/search.svg" alt="" />
            </div>
          </div>
          <div class="nav_top_menu">
            <a href="../order/cart.html">
              <div class="top_menu_box">
                <div class="box_icon_box">
                  <img src="../public/images/icons/heart.svg" alt="" />
                </div>
                <div class="box_menu_info">
                  <span>Wishlist</span>
                  <strong>My items</strong>
                </div>
              </div>
            </a>

            <a href="../other/login.html">
              <div class="top_menu_box">
                <div class="box_icon_box">
                  <img src="../public/images/icons/profile.svg" alt="" />
                </div>
                <div class="box_menu_info">
                  <span>Sign in</span>
                  <strong>Account</strong>
                </div>
              </div>
            </a>
            <a href="../order/cart.html">
              <div class="top_menu_box">
                <div class="box_icon_box">
                  <div class="cart_count">2</div>
                  <img src="../public/images/icons/shopping-cart.svg" alt="" />
                </div>

                <div class="box_menu_info">
                  <span>$200.99</span>
                  <strong>Total</strong>
                </div>
              </div>
            </a>
          </div>
        </div>
        <hr />
        <div class="navbar_bottom">
          <div class="browse_box">
            <img src="../public/images/icons/browse.svg" alt="" />
            <span>Browse Categories</span>
          </div>
          <div class="navbar_route_menu">
            <a href="../index.html">Home</a>
            <a href="./all.html">Shop</a>
            <a href="../order/cart.html">Order</a>
            <a href="../other/about.html">About</a>
            <a href="../other/contact.html" class="yellow">Contact</a>
          </div>

          <div class="sorting_menu">
            <span>Dael of the Day</span>
            <span>Hot Deals</span>
            <span>best Sellers</span>
            <span>New Arrilavs</span>
          </div>
        </div>
      </div>
    </div>
    <section class="login_page">
      <div class="container">
        <div class="login_head">
          <p>Create your account</p>
        </div>
        <div class="login_content">
          <form action="">
            <div class="username">
              <label>Your Name</label>
              <input type="text" name="" id="" placeholder="ALi Tufan" />
            </div>

            <div class="username">
              <label>Username</label>
              <input type="text" name="" id="" placeholder="alitfn" />
            </div>

            <div class="username">
              <label>Your Email</label>
              <input
                type="email"
                name=""
                id=""
                placeholder="creativ@gmail.com"
              />
            </div>

            <div class="username">
              <label>Password</label>
              <input type="password" name="" id="" placeholder="**********" />
            </div>
            <button>Login</button>

            <p>
              Already have an account?
              <a href="../other/login.html">Sign In</a>
            </p>

            <span>or</span>

            <div class="social_icons">
              <i class="fa-brands fa-facebook"></i>
              <i class="fa-brands fa-google"></i>
              <i class="fa-brands fa-twitter"></i>
              <i class="fa-brands fa-apple"></i>
            </div>
          </form>
        </div>
      </div>
    </section>
  </body>
</html>
